<h1>eIQ</h1>
<p class="lead">
現場の知的判断をスコア化するテスト。
</p>

<section class="card">
<h2>eIQとは</h2>
<ul>
<li>IQではない</li>
<li>診断ではない</li>
<li>価値や優劣を決めない</li>
<li>目的は「思考の運用」を観測すること</li>
</ul>
</section>

<section class="card">
<h2>特徴</h2>
<ul>
<li>採点はAIで公平にスコア化（基準非公開）</li>
<li>制限時間なし（ただし計測）</li>
<li>AI使用可（自己申告必須）</li>
<li>点数は他言しない</li>
</ul>
</section>
