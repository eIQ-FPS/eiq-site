<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>eIQ｜受験申し込み</title>
  <style>
    body{
      margin:0;
      font-family: system-ui, -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background:#0b0f14;
      color:#e8eefc;
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
    }
    .card{
      background:#121823;
      padding:40px;
      border-radius:18px;
      max-width:520px;
      text-align:center;
      border:1px solid #22304a;
      box-shadow:0 20px 60px rgba(0,0,0,.4);
    }
    h1{margin:0 0 12px;font-size:28px}
    p{color:#a8b3cf;line-height:1.7}
    .btn{
      display:inline-block;
      margin-top:20px;
      padding:14px 22px;
      background:#2b6fff;
      color:#fff;
      border-radius:12px;
      font-weight:700;
      text-decoration:none;
    }
    .note{
      margin-top:18px;
      font-size:12px;
      color:#8894b3;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>eIQ 受験申し込み</h1>
    <p>
      eIQは有料テストです。<br>
      受験するには受験料の支払いが必要です。
    </p>

    <!-- ★ ここにあなたのStripe支払いリンクを入れる -->
    <a class="btn" href="https://buy.stripe.com/6oU6oH8Dt27q4qqcz13Nm02" target="_blank">
      受験料を支払う（¥5,000）
    </a>

    <div class="note">
      支払い完了後、自動で受験ページへ移動します。
    </div>
  </div>
</body>
</html>
